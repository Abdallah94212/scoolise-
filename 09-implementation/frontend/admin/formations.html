<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formations — Administration | Scoolize</title>
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/base.css">
</head>
<body class="theme-prepare">
<a class="skip-link" href="#main">Aller au contenu principal</a>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="../index.html"><span class="brand-mark">S</span> Scoolize <span class="brand-sub">Administration</span></a>
    <div class="topbar-actions">
      <span class="badge badge-neutral" id="admin-name">—</span>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Déconnexion</button>
    </div>
  </div>
</header>

<main id="main" class="main">
  <div class="container">
    <nav class="admin-nav">
      <a href="dashboard.html">Tableau de bord</a>
      <a href="utilisateurs.html">Utilisateurs</a>
      <a href="ecoles.html">Écoles</a>
      <a class="active" href="formations.html">Formations</a>
      <a href="statistiques.html">Statistiques</a>
      <a href="candidatures.html">Candidatures</a>
    </nav>

    <h1>Gestion des formations</h1>
    <div id="error-box" class="alert alert-danger" style="display:none;"></div>

    <div class="card section">
      <h3 id="form-title">Ajouter une formation</h3>
      <form id="formation-form">
        <input type="hidden" id="formation-id">
        <div class="grid grid-2">
          <div class="field"><label for="name">Nom</label><input type="text" id="name" required></div>
          <div class="field">
            <label for="schoolId">Établissement</label>
            <select id="schoolId" required></select>
          </div>
        </div>
        <div class="grid grid-3">
          <div class="field"><label for="type">Type</label><input type="text" id="type" placeholder="BUT, Licence…" required></div>
          <div class="field"><label for="domain">Domaine</label><input type="text" id="domain" placeholder="Économie & gestion…" required></div>
          <div class="field"><label for="capacity">Places</label><input type="number" id="capacity" min="0" value="0"></div>
        </div>
        <div class="field"><label for="description">Description</label><input type="text" id="description"></div>
        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary" id="submit-btn">Ajouter</button>
          <button type="button" class="btn btn-ghost" id="cancel-edit" style="display:none;">Annuler la modification</button>
        </div>
      </form>
    </div>

    <div class="data-table-wrap mt-3">
      <table class="data-table">
        <thead><tr><th>Nom</th><th>Établissement</th><th>Type</th><th>Domaine</th><th>Places</th><th>Actions</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container flex-between">
    <span>Scoolize — Administration</span>
    <a href="../index.html">← Retour au portail</a>
  </div>
</footer>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-guard.js"></script>
<script>
  const { api, auth } = window.ScoolizeAPI;
  document.getElementById('admin-name').textContent = `${auth.getUser().firstName} ${auth.getUser().lastName}`;
  document.getElementById('logout-btn').addEventListener('click', () => {
    auth.clearSession();
    window.location.href = '../auth/login.html';
  });

  function showError(err) {
    const box = document.getElementById('error-box');
    box.textContent = err.message;
    box.style.display = 'block';
  }

  function resetForm() {
    document.getElementById('formation-form').reset();
    document.getElementById('formation-id').value = '';
    document.getElementById('form-title').textContent = 'Ajouter une formation';
    document.getElementById('submit-btn').textContent = 'Ajouter';
    document.getElementById('cancel-edit').style.display = 'none';
  }

  async function loadSchoolOptions() {
    const data = await api.get('/schools', { pageSize: 100 });
    const select = document.getElementById('schoolId');
    select.innerHTML = data.items.map((s) => `<option value="${s.id}">${s.name} (${s.city})</option>`).join('');
  }

  async function load() {
    try {
      const data = await api.get('/formations', { pageSize: 50 });
      const rows = document.getElementById('rows');
      rows.innerHTML = data.items
        .map(
          (f) => `
        <tr>
          <td>${f.name}</td>
          <td>${f.school.name}</td>
          <td>${f.type}</td>
          <td>${f.domain}</td>
          <td>${f.capacity}</td>
          <td>
            <button class="btn btn-secondary btn-sm" data-edit='${JSON.stringify(f).replace(/'/g, '&#39;')}'>Modifier</button>
            <button class="btn btn-ghost btn-sm" data-delete="${f.id}" style="color:var(--danger);">Supprimer</button>
          </td>
        </tr>`
        )
        .join('');

      rows.querySelectorAll('[data-edit]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const f = JSON.parse(btn.dataset.edit);
          document.getElementById('formation-id').value = f.id;
          document.getElementById('name').value = f.name;
          document.getElementById('schoolId').value = f.school.id;
          document.getElementById('type').value = f.type;
          document.getElementById('domain').value = f.domain;
          document.getElementById('capacity').value = f.capacity;
          document.getElementById('description').value = f.description || '';
          document.getElementById('form-title').textContent = `Modifier « ${f.name} »`;
          document.getElementById('submit-btn').textContent = 'Enregistrer les modifications';
          document.getElementById('cancel-edit').style.display = '';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      rows.querySelectorAll('[data-delete]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (!confirm('Supprimer cette formation ?')) return;
          try {
            await api.del(`/formations/${btn.dataset.delete}`);
            load();
          } catch (err) {
            showError(err);
          }
        });
      });
    } catch (err) {
      showError(err);
    }
  }

  document.getElementById('cancel-edit').addEventListener('click', resetForm);

  document.getElementById('formation-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error-box').style.display = 'none';
    const id = document.getElementById('formation-id').value;
    const payload = {
      name: document.getElementById('name').value.trim(),
      schoolId: document.getElementById('schoolId').value,
      type: document.getElementById('type').value.trim(),
      domain: document.getElementById('domain').value.trim(),
      capacity: Number(document.getElementById('capacity').value) || 0,
      description: document.getElementById('description').value.trim() || undefined,
    };
    try {
      if (id) {
        await api.put(`/formations/${id}`, payload);
      } else {
        await api.post('/formations', payload);
      }
      resetForm();
      load();
    } catch (err) {
      showError(err);
    }
  });

  (async () => {
    await loadSchoolOptions();
    load();
  })();
</script>
</body>
</html>
